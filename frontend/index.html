<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTNS GridX — Login | Tamil Nadu Police</title>
    <meta name="description" content="CCTNS GridX Crime Predictive Model & Hotspot Mapping Platform — Tamil Nadu Police">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/forms.css">
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-gradient-orb bg-orb-cyan"></div>
    <div class="bg-gradient-orb bg-orb-magenta"></div>
    <div class="login-page">
        <div class="login-container">
            <div class="login-card">
                <div class="login-brand">
                    <div class="logo-mark">GX</div>
                    <h1>CCTNS GridX</h1>
                    <p>Crime Predictive Model & Hotspot Mapping</p>
                    <p style="margin-top:4px;color:var(--accent-cyan);font-size:0.75rem;">Government of Tamil Nadu — Police Department</p>
                </div>
                <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-input" id="username" placeholder="Enter username" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" id="password" placeholder="Enter password" required autocomplete="current-password">
                    </div>
                    <div id="loginError" class="form-error hidden"></div>
                    <button type="submit" class="btn btn-primary login-btn" id="loginBtn">🔐 Secure Login</button>
                </form>
                <div class="login-demo">
                    <h4>Demo Accounts</h4>
                    <div class="demo-accounts">
                        <button class="demo-btn" onclick="fillDemo('sp_admin','admin123')">SP (Admin)</button>
                        <button class="demo-btn" onclick="fillDemo('dsp_ops','admin123')">DSP (Analyst)</button>
                        <button class="demo-btn" onclick="fillDemo('sho_adyar','admin123')">SHO (Officer)</button>
                        <button class="demo-btn" onclick="fillDemo('si_patrol','admin123')">SI (Officer)</button>
                        <button class="demo-btn" onclick="fillDemo('constable1','admin123')">Constable</button>
                    </div>
                </div>
                <div class="tn-gov-badge">🏛️ Government of Tamil Nadu • CCTNS Integration Platform • v1.0</div>
            </div>
        </div>
    </div>
    <script src="/js/utils.js"></script>
    <script>
        if (Utils.isLoggedIn()) window.location.href = '/dashboard';
        function fillDemo(u, p) { document.getElementById('username').value = u; document.getElementById('password').value = p; }
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errEl = document.getElementById('loginError');
            btn.disabled = true; btn.textContent = 'Authenticating...'; errEl.classList.add('hidden');
            try {
                const res = await Utils.post('/api/auth/login', {
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value,
                });
                Utils.setToken(res.token);
                Utils.setUser(res.user);
                window.location.href = '/dashboard';
            } catch(err) {
                errEl.textContent = err.message || 'Login failed';
                errEl.classList.remove('hidden');
                btn.disabled = false; btn.textContent = '🔐 Secure Login';
            }
        }
    </script>
</body>
</html>
